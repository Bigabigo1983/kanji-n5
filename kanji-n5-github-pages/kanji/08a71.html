<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>話 — Kanji N5</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#faf3e1;font-family:sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:20px}
h1{font-size:120px;color:#2b3261;margin:10px 0;line-height:1}
.info{color:#2b3261;font-size:16px;margin:6px 0;text-align:center}
.info span{font-size:14px;opacity:.7}
.btn{margin:14px 6px;padding:12px 28px;border:none;border-radius:8px;font-size:16px;cursor:pointer;background:#2b3261;color:#faf3e1}
.btn:active{opacity:.8}
#canvas-wrap{margin:10px 0}
canvas{border:2px solid #2b3261;border-radius:10px;background:#faf3e1}
.examples{margin-top:16px;width:100%;max-width:380px}
.ex{background:#f0e8d0;border-radius:8px;padding:10px 14px;margin:6px 0}
.ex .kanji{font-size:22px;color:#2b3261;font-weight:bold}
.ex .rom{font-size:13px;color:#7a6b20;margin-top:2px}
.ex .th{font-size:13px;color:#2b3261;margin-top:2px}
.back{margin-top:20px;color:#2b3261;font-size:13px;opacity:.6}
</style>
</head>
<body>
<h1>話</h1>
<div class="info">音読み <b>ワ</b> &nbsp;|&nbsp; 訓読み <b>はなす</b></div>
<div class="info"><span>ความหมาย: </span><b>พูด</b></div>
<div id="canvas-wrap"><canvas id="c" width="280" height="280"></canvas></div>
<div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center">
  <button class="btn" onclick="playAnim()">▶ ดู Stroke Order</button>
  <button class="btn" onclick="speakJP()">🔊 ฟังเสียง</button>
</div>
<div class="examples">
  <div class="ex">
    <div class="kanji">電話</div>
    <div class="rom">denwa</div>
    <div class="th">โทรศัพท์</div>
  </div>
  <div class="ex">
    <div class="kanji">話す</div>
    <div class="rom">hanasu</div>
    <div class="th">พูด</div>
  </div>
</div>
<div class="back">JLPT N5 Kanji Writing Practice</div>
<script>
const strokes=[[[24.99, 14.0, 27.35, 15.5, 31.09, 20.17, 31.69, 22.5]], [[11.37, 32.83, 12.78, 33.25, 14.44, 33.12, 15.88, 33.0], [15.88, 33.0, 24.17, 32.3, 32.83, 31.1, 39.47, 30.19], [39.47, 30.19, 40.75, 30.02, 42.69, 30.3, 43.34, 30.42]], [[17.78, 47.06, 18.83, 47.38, 19.93, 47.41, 21.01, 47.35], [21.01, 47.35, 25.12, 47.12, 31.7, 45.76, 35.44, 45.38], [35.44, 45.38, 36.75, 45.25, 38.12, 45.25, 39.48, 45.25]], [[18.58, 59.33, 19.78, 59.69, 21.38, 59.46, 22.62, 59.41], [22.62, 59.41, 26.33, 59.25, 31.0, 58.62, 35.54, 58.05], [35.54, 58.05, 36.97, 57.87, 38.39, 57.71, 39.84, 57.97]], [[17.4, 71.9, 18.21, 72.58, 18.73, 73.72, 18.89, 74.77], [18.89, 74.77, 19.62, 79.38, 20.29, 83.08, 21.09, 87.95], [21.09, 87.95, 21.31, 89.28, 21.52, 90.57, 21.72, 91.75]], [[19.64, 73.54, 26.31, 72.4, 32.95, 70.79, 39.1, 69.88], [39.1, 69.88, 40.95, 69.61, 42.06, 71.14, 41.8, 72.39], [41.8, 72.39, 40.91, 76.58, 39.34, 80.55, 37.75, 86.46]], [[22.49, 89.55, 27.25, 89.0, 31.35, 88.38, 36.51, 87.83], [36.51, 87.83, 37.44, 87.73, 38.42, 87.87, 39.48, 87.74]], [[81.75, 13.75, 81.63, 15.0, 80.96, 16.14, 80.09, 16.81], [80.09, 16.81, 75.25, 20.5, 64.75, 26.75, 50.75, 31.75]], [[45.39, 45.8, 46.94, 46.14, 49.75, 46.42, 52.12, 46.14], [52.12, 46.14, 62.8, 44.9, 76.37, 43.07, 91.0, 42.23], [91.0, 42.23, 93.28, 42.1, 95.49, 42.22, 97.75, 42.52]], [[68.87, 27.19, 70.27, 28.59, 70.72, 30.25, 70.72, 32.07], [70.72, 32.07, 70.72, 33.51, 70.51, 60.25, 70.51, 67.23]], [[52.07, 67.83, 53.0, 69.0, 53.29, 69.59, 53.42, 70.17], [53.42, 70.17, 54.8, 76.37, 55.55, 82.5, 56.5, 90.5], [56.5, 90.5, 56.63, 91.64, 56.77, 92.81, 56.92, 94.03]], [[54.62, 69.29, 67.52, 67.92, 80.03, 66.56, 87.3, 65.98], [87.3, 65.98, 90.24, 65.74, 91.09, 68.38, 90.67, 69.78], [90.67, 69.78, 89.2, 74.65, 87.64, 81.42, 85.63, 88.13]], [[56.64, 91.74, 64.14, 91.17, 73.63, 90.61, 83.78, 89.81], [83.78, 89.81, 85.15, 89.7, 86.53, 89.59, 87.91, 89.47]]];
const W=280,SCALE=W*0.82/109,OX=W*0.09,OY=W*0.09;
const cv=document.getElementById('c'),ctx=cv.getContext('2d');

function tx(x){return OX+x*SCALE}
function ty(y){return OY+(109-y)*SCALE}

function drawSegs(segs,alpha,lw){
  ctx.strokeStyle=`rgba(43,50,97,${alpha})`;
  ctx.lineWidth=lw;ctx.lineCap='round';ctx.lineJoin='round';
  ctx.beginPath();
  for(const s of segs){
    ctx.moveTo(tx(s[0]),ty(s[1]));
    ctx.bezierCurveTo(tx(s[2]),ty(s[3]),tx(s[4]),ty(s[5]),tx(s[6]),ty(s[7]));
  }
  ctx.stroke();
}

function drawAll(upTo,highlightLast){
  ctx.clearRect(0,0,W,W);
  for(let i=0;i<upTo-1;i++) drawSegs(strokes[i],0.25,3);
  if(upTo>0) drawSegs(strokes[upTo-1],1.0, highlightLast?5:3);
}

let frame=0,timer=null;
function playAnim(){
  clearInterval(timer);frame=0;
  timer=setInterval(()=>{
    frame++;drawAll(frame,true);
    if(frame>=strokes.length)clearInterval(timer);
  },600);
}

function speakJP(){
  const u=new SpeechSynthesisUtterance('話');
  u.lang='ja-JP';u.rate=0.8;
  speechSynthesis.speak(u);
}

// draw complete on load
drawAll(strokes.length,false);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>間 — Kanji N5</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#faf3e1;font-family:sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:20px}
h1{font-size:120px;color:#2b3261;margin:10px 0;line-height:1}
.info{color:#2b3261;font-size:16px;margin:6px 0;text-align:center}
.info span{font-size:14px;opacity:.7}
.btn{margin:14px 6px;padding:12px 28px;border:none;border-radius:8px;font-size:16px;cursor:pointer;background:#2b3261;color:#faf3e1}
.btn:active{opacity:.8}
#canvas-wrap{margin:10px 0}
canvas{border:2px solid #2b3261;border-radius:10px;background:#faf3e1}
.examples{margin-top:16px;width:100%;max-width:380px}
.ex{background:#f0e8d0;border-radius:8px;padding:10px 14px;margin:6px 0}
.ex .kanji{font-size:22px;color:#2b3261;font-weight:bold}
.ex .rom{font-size:13px;color:#7a6b20;margin-top:2px}
.ex .th{font-size:13px;color:#2b3261;margin-top:2px}
.back{margin-top:20px;color:#2b3261;font-size:13px;opacity:.6}
</style>
</head>
<body>
<h1>間</h1>
<div class="info">音読み <b>カン</b> &nbsp;|&nbsp; 訓読み <b>あいだ</b></div>
<div class="info"><span>ความหมาย: </span><b>ระหว่าง</b></div>
<div id="canvas-wrap"><canvas id="c" width="280" height="280"></canvas></div>
<div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center">
  <button class="btn" onclick="playAnim()">▶ ดู Stroke Order</button>
  <button class="btn" onclick="speakJP()">🔊 ฟังเสียง</button>
</div>
<div class="examples">
  <div class="ex">
    <div class="kanji">時間</div>
    <div class="rom">jikan</div>
    <div class="th">เวลา</div>
  </div>
  <div class="ex">
    <div class="kanji">人間</div>
    <div class="rom">ningen</div>
    <div class="th">มนุษย์</div>
  </div>
</div>
<div class="back">JLPT N5 Kanji Writing Practice</div>
<script>
const strokes=[[[18.64, 15.3, 19.35, 16.01, 19.82, 17.12, 19.82, 18.73], [19.82, 18.73, 19.82, 22.62, 19.77, 75.38, 19.63, 91.5], [19.63, 91.5, 19.61, 93.42, 19.6, 95.53, 19.58, 96.15]], [[21.01, 16.81, 26.76, 16.21, 39.74, 14.07, 41.51, 13.97], [41.51, 13.97, 43.36, 13.87, 44.37, 14.25, 44.41, 15.99], [44.41, 15.99, 44.47, 18.74, 43.91, 32.09, 43.56, 36.75], [43.56, 36.75, 43.44, 38.3, 43.37, 39.32, 43.37, 39.45]], [[20.95, 27.27, 26.94, 26.66, 35.87, 25.25, 42.83, 24.67]], [[21.02, 39.04, 29.13, 37.85, 35.16, 36.94, 42.33, 36.4]], [[63.19, 13.1, 64.17, 14.08, 64.53, 15.25, 64.53, 16.07], [64.53, 16.07, 64.53, 21.87, 64.45, 28.72, 64.47, 35.0], [64.47, 35.0, 64.48, 37.01, 64.49, 38.4, 64.53, 38.58]], [[65.32, 14.77, 71.29, 14.09, 86.01, 11.58, 87.7, 11.49], [87.7, 11.49, 89.5, 11.4, 90.51, 12.37, 90.51, 14.31], [90.51, 14.31, 90.51, 31.31, 90.29, 80.43, 90.29, 92.75], [90.29, 92.75, 90.29, 103.25, 83.94, 94.11, 82.57, 92.98]], [[65.63, 24.79, 70.12, 24.37, 85.36, 22.8, 88.98, 22.8]], [[65.22, 36.07, 71.63, 35.75, 81.75, 34.75, 88.71, 34.26]], [[40.56, 50.95, 41.3, 51.69, 41.6, 52.88, 41.6, 53.94], [41.6, 53.94, 41.6, 54.77, 41.52, 74.78, 41.55, 83.0], [41.55, 83.0, 41.56, 85.25, 41.57, 85.77, 41.6, 86.0]], [[42.26, 52.09, 47.82, 51.61, 61.97, 50.11, 63.56, 49.99], [63.56, 49.99, 65.24, 49.86, 66.32, 51.45, 66.19, 52.23], [66.19, 52.23, 65.98, 53.47, 65.78, 72.89, 65.71, 81.25], [65.71, 81.25, 65.69, 83.54, 65.68, 85.05, 65.68, 85.22]], [[42.64, 66.6, 47.75, 66.12, 60.0, 64.87, 64.52, 64.53]], [[42.25, 82.8, 47.38, 82.5, 59.25, 81.25, 64.51, 80.75]]];
const W=280,SCALE=W*0.82/109,OX=W*0.09,OY=W*0.09;
const cv=document.getElementById('c'),ctx=cv.getContext('2d');

function tx(x){return OX+x*SCALE}
function ty(y){return OY+(109-y)*SCALE}

function drawSegs(segs,alpha,lw){
  ctx.strokeStyle=`rgba(43,50,97,${alpha})`;
  ctx.lineWidth=lw;ctx.lineCap='round';ctx.lineJoin='round';
  ctx.beginPath();
  for(const s of segs){
    ctx.moveTo(tx(s[0]),ty(s[1]));
    ctx.bezierCurveTo(tx(s[2]),ty(s[3]),tx(s[4]),ty(s[5]),tx(s[6]),ty(s[7]));
  }
  ctx.stroke();
}

function drawAll(upTo,highlightLast){
  ctx.clearRect(0,0,W,W);
  for(let i=0;i<upTo-1;i++) drawSegs(strokes[i],0.25,3);
  if(upTo>0) drawSegs(strokes[upTo-1],1.0, highlightLast?5:3);
}

let frame=0,timer=null;
function playAnim(){
  clearInterval(timer);frame=0;
  timer=setInterval(()=>{
    frame++;drawAll(frame,true);
    if(frame>=strokes.length)clearInterval(timer);
  },600);
}

function speakJP(){
  const u=new SpeechSynthesisUtterance('間');
  u.lang='ja-JP';u.rate=0.8;
  speechSynthesis.speak(u);
}

// draw complete on load
drawAll(strokes.length,false);
</script>
</body>
</html>

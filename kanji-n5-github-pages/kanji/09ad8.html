<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>高 — Kanji N5</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#faf3e1;font-family:sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:20px}
h1{font-size:120px;color:#2b3261;margin:10px 0;line-height:1}
.info{color:#2b3261;font-size:16px;margin:6px 0;text-align:center}
.info span{font-size:14px;opacity:.7}
.btn{margin:14px 6px;padding:12px 28px;border:none;border-radius:8px;font-size:16px;cursor:pointer;background:#2b3261;color:#faf3e1}
.btn:active{opacity:.8}
#canvas-wrap{margin:10px 0}
canvas{border:2px solid #2b3261;border-radius:10px;background:#faf3e1}
.examples{margin-top:16px;width:100%;max-width:380px}
.ex{background:#f0e8d0;border-radius:8px;padding:10px 14px;margin:6px 0}
.ex .kanji{font-size:22px;color:#2b3261;font-weight:bold}
.ex .rom{font-size:13px;color:#7a6b20;margin-top:2px}
.ex .th{font-size:13px;color:#2b3261;margin-top:2px}
.back{margin-top:20px;color:#2b3261;font-size:13px;opacity:.6}
</style>
</head>
<body>
<h1>高</h1>
<div class="info">音読み <b>コウ</b> &nbsp;|&nbsp; 訓読み <b>たかい</b></div>
<div class="info"><span>ความหมาย: </span><b>สูง</b></div>
<div id="canvas-wrap"><canvas id="c" width="280" height="280"></canvas></div>
<div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center">
  <button class="btn" onclick="playAnim()">▶ ดู Stroke Order</button>
  <button class="btn" onclick="speakJP()">🔊 ฟังเสียง</button>
</div>
<div class="examples">
  <div class="ex">
    <div class="kanji">高い</div>
    <div class="rom">takai</div>
    <div class="th">สูง</div>
  </div>
  <div class="ex">
    <div class="kanji">高校</div>
    <div class="rom">koukou</div>
    <div class="th">ม.ปลาย</div>
  </div>
</div>
<div class="back">JLPT N5 Kanji Writing Practice</div>
<script>
const strokes=[[[52.47, 11.75, 53.55, 12.83, 53.95, 14.0, 53.95, 15.97], [53.95, 15.97, 53.95, 17.5, 53.83, 20.25, 53.83, 21.42]], [[22.9, 25.7, 25.58, 26.0, 27.86, 25.96, 30.37, 25.66], [30.37, 25.66, 45.13, 23.88, 66.2, 21.5, 79.67, 20.49], [79.67, 20.49, 82.56, 20.27, 84.66, 20.37, 86.48, 20.82]], [[36.25, 34.75, 37.25, 35.38, 37.75, 36.25, 38.03, 37.64], [38.03, 37.64, 38.75, 41.23, 39.39, 45.01, 40.08, 49.49], [40.08, 49.49, 40.28, 50.79, 40.25, 51.31, 40.52, 52.5]], [[39.05, 36.33, 49.0, 34.62, 63.04, 32.68, 68.66, 32.23], [68.66, 32.23, 71.62, 32.0, 72.49, 33.25, 71.8, 35.54], [71.8, 35.54, 70.92, 38.47, 69.63, 42.55, 68.48, 45.74]], [[41.28, 49.94, 47.85, 49.52, 57.64, 48.07, 67.0, 47.23], [67.0, 47.23, 68.3, 47.11, 69.59, 47.01, 70.85, 46.92]], [[21.0, 60.25, 22.31, 61.56, 22.9, 63.01, 23.21, 65.25], [23.21, 65.25, 24.0, 70.87, 25.42, 83.44, 26.37, 92.24], [26.37, 92.24, 26.52, 93.63, 26.65, 94.91, 26.75, 96.0]], [[24.06, 64.0, 40.14, 62.49, 82.69, 57.45, 84.25, 57.25], [84.25, 57.25, 88.0, 56.75, 90.25, 58.75, 89.5, 63.5], [89.5, 63.5, 88.01, 72.95, 86.88, 83.12, 84.25, 91.75], [84.25, 91.75, 82.2, 98.5, 78.87, 94.25, 76.45, 91.75]], [[41.5, 71.68, 42.16, 72.34, 42.66, 73.31, 42.81, 74.15], [42.81, 74.15, 43.7, 76.97, 44.39, 81.39, 45.2, 85.96], [45.2, 85.96, 45.41, 87.12, 45.6, 87.74, 45.76, 88.75]], [[44.02, 73.08, 50.81, 71.72, 61.12, 70.22, 64.94, 69.73], [64.94, 69.73, 66.75, 69.5, 68.25, 70.75, 68.07, 72.23], [68.07, 72.23, 67.72, 75.15, 66.11, 80.54, 64.95, 83.98]], [[46.44, 87.05, 51.05, 86.65, 57.45, 85.74, 63.76, 85.11], [63.76, 85.11, 64.64, 85.02, 65.53, 84.94, 66.41, 84.85]]];
const W=280,SCALE=W*0.82/109,OX=W*0.09,OY=W*0.09;
const cv=document.getElementById('c'),ctx=cv.getContext('2d');

function tx(x){return OX+x*SCALE}
function ty(y){return OY+(109-y)*SCALE}

function drawSegs(segs,alpha,lw){
  ctx.strokeStyle=`rgba(43,50,97,${alpha})`;
  ctx.lineWidth=lw;ctx.lineCap='round';ctx.lineJoin='round';
  ctx.beginPath();
  for(const s of segs){
    ctx.moveTo(tx(s[0]),ty(s[1]));
    ctx.bezierCurveTo(tx(s[2]),ty(s[3]),tx(s[4]),ty(s[5]),tx(s[6]),ty(s[7]));
  }
  ctx.stroke();
}

function drawAll(upTo,highlightLast){
  ctx.clearRect(0,0,W,W);
  for(let i=0;i<upTo-1;i++) drawSegs(strokes[i],0.25,3);
  if(upTo>0) drawSegs(strokes[upTo-1],1.0, highlightLast?5:3);
}

let frame=0,timer=null;
function playAnim(){
  clearInterval(timer);frame=0;
  timer=setInterval(()=>{
    frame++;drawAll(frame,true);
    if(frame>=strokes.length)clearInterval(timer);
  },600);
}

function speakJP(){
  const u=new SpeechSynthesisUtterance('高');
  u.lang='ja-JP';u.rate=0.8;
  speechSynthesis.speak(u);
}

// draw complete on load
drawAll(strokes.length,false);
</script>
</body>
</html>

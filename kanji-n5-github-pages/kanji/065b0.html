<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>新 — Kanji N5</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#faf3e1;font-family:sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:20px}
h1{font-size:120px;color:#2b3261;margin:10px 0;line-height:1}
.info{color:#2b3261;font-size:16px;margin:6px 0;text-align:center}
.info span{font-size:14px;opacity:.7}
.btn{margin:14px 6px;padding:12px 28px;border:none;border-radius:8px;font-size:16px;cursor:pointer;background:#2b3261;color:#faf3e1}
.btn:active{opacity:.8}
#canvas-wrap{margin:10px 0}
canvas{border:2px solid #2b3261;border-radius:10px;background:#faf3e1}
.examples{margin-top:16px;width:100%;max-width:380px}
.ex{background:#f0e8d0;border-radius:8px;padding:10px 14px;margin:6px 0}
.ex .kanji{font-size:22px;color:#2b3261;font-weight:bold}
.ex .rom{font-size:13px;color:#7a6b20;margin-top:2px}
.ex .th{font-size:13px;color:#2b3261;margin-top:2px}
.back{margin-top:20px;color:#2b3261;font-size:13px;opacity:.6}
</style>
</head>
<body>
<h1>新</h1>
<div class="info">音読み <b>シン</b> &nbsp;|&nbsp; 訓読み <b>あたらしい</b></div>
<div class="info"><span>ความหมาย: </span><b>ใหม่</b></div>
<div id="canvas-wrap"><canvas id="c" width="280" height="280"></canvas></div>
<div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center">
  <button class="btn" onclick="playAnim()">▶ ดู Stroke Order</button>
  <button class="btn" onclick="speakJP()">🔊 ฟังเสียง</button>
</div>
<div class="examples">
  <div class="ex">
    <div class="kanji">新しい</div>
    <div class="rom">atarashii</div>
    <div class="th">ใหม่</div>
  </div>
  <div class="ex">
    <div class="kanji">新聞</div>
    <div class="rom">shinbun</div>
    <div class="th">หนังสือพิมพ์</div>
  </div>
</div>
<div class="back">JLPT N5 Kanji Writing Practice</div>
<script>
const strokes=[[[33.72, 12.76, 34.6, 13.64, 35.25, 15.25, 35.25, 17.11], [35.25, 17.11, 35.25, 19.74, 35.26, 19.01, 35.27, 26.15]], [[18.32, 28.69, 19.51, 28.8, 20.93, 28.86, 22.11, 28.72], [22.11, 28.72, 29.51, 27.88, 40.13, 26.13, 47.73, 25.5], [47.73, 25.5, 49.71, 25.34, 50.92, 25.47, 51.91, 25.52]], [[23.62, 34.38, 27.01, 39.2, 27.65, 42.46, 27.96, 45.74]], [[45.59, 29.5, 46.21, 30.59, 45.97, 32.09, 45.51, 33.25], [45.51, 33.25, 43.86, 37.37, 40.77, 43.84, 39.63, 45.86]], [[14.17, 50.95, 15.95, 51.22, 17.74, 51.22, 19.51, 51.0], [19.51, 51.0, 27.47, 49.98, 40.57, 48.26, 48.63, 47.64], [48.63, 47.64, 50.59, 47.49, 52.54, 47.61, 54.5, 47.75]], [[16.76, 63.42, 17.59, 63.64, 19.81, 63.86, 21.99, 63.6], [21.99, 63.6, 30.87, 62.51, 39.0, 61.26, 48.07, 60.59], [48.07, 60.59, 50.27, 60.43, 50.83, 60.36, 52.2, 60.59]], [[34.38, 51.0, 35.5, 52.12, 35.88, 53.75, 35.88, 55.22], [35.88, 55.22, 35.88, 56.53, 35.73, 79.47, 35.63, 90.0], [35.63, 90.0, 35.61, 92.8, 35.58, 94.69, 35.57, 95.0]], [[34.25, 62.84, 34.25, 64.25, 33.9, 65.31, 33.38, 66.21], [33.38, 66.21, 29.13, 73.66, 20.44, 83.33, 13.75, 87.25]], [[39.25, 68.5, 43.96, 71.48, 47.15, 74.47, 48.74, 76.93]], [[82.74, 17.44, 82.62, 18.37, 82.28, 19.74, 81.47, 20.65], [81.47, 20.65, 76.25, 26.5, 70.5, 30.62, 61.69, 35.7]], [[59.2, 35.14, 60.03, 35.97, 60.73, 37.42, 60.73, 39.1], [60.73, 39.1, 60.73, 68.25, 58.37, 77.62, 51.75, 87.5]], [[62.89, 47.36, 64.87, 47.25, 66.25, 47.05, 67.43, 46.88], [67.43, 46.88, 75.25, 45.75, 86.25, 44.5, 93.72, 43.58], [93.72, 43.58, 94.9, 43.43, 96.97, 43.41, 97.71, 43.58]], [[80.32, 48.54, 81.27, 49.49, 81.91, 50.75, 81.91, 52.34], [81.91, 52.34, 81.91, 53.27, 82.15, 80.06, 82.07, 92.5], [82.07, 92.5, 82.05, 94.83, 82.03, 96.67, 82.01, 97.75]]];
const W=280,SCALE=W*0.82/109,OX=W*0.09,OY=W*0.09;
const cv=document.getElementById('c'),ctx=cv.getContext('2d');

function tx(x){return OX+x*SCALE}
function ty(y){return OY+(109-y)*SCALE}

function drawSegs(segs,alpha,lw){
  ctx.strokeStyle=`rgba(43,50,97,${alpha})`;
  ctx.lineWidth=lw;ctx.lineCap='round';ctx.lineJoin='round';
  ctx.beginPath();
  for(const s of segs){
    ctx.moveTo(tx(s[0]),ty(s[1]));
    ctx.bezierCurveTo(tx(s[2]),ty(s[3]),tx(s[4]),ty(s[5]),tx(s[6]),ty(s[7]));
  }
  ctx.stroke();
}

function drawAll(upTo,highlightLast){
  ctx.clearRect(0,0,W,W);
  for(let i=0;i<upTo-1;i++) drawSegs(strokes[i],0.25,3);
  if(upTo>0) drawSegs(strokes[upTo-1],1.0, highlightLast?5:3);
}

let frame=0,timer=null;
function playAnim(){
  clearInterval(timer);frame=0;
  timer=setInterval(()=>{
    frame++;drawAll(frame,true);
    if(frame>=strokes.length)clearInterval(timer);
  },600);
}

function speakJP(){
  const u=new SpeechSynthesisUtterance('新');
  u.lang='ja-JP';u.rate=0.8;
  speechSynthesis.speak(u);
}

// draw complete on load
drawAll(strokes.length,false);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>語 — Kanji N5</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#faf3e1;font-family:sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:20px}
h1{font-size:120px;color:#2b3261;margin:10px 0;line-height:1}
.info{color:#2b3261;font-size:16px;margin:6px 0;text-align:center}
.info span{font-size:14px;opacity:.7}
.btn{margin:14px 6px;padding:12px 28px;border:none;border-radius:8px;font-size:16px;cursor:pointer;background:#2b3261;color:#faf3e1}
.btn:active{opacity:.8}
#canvas-wrap{margin:10px 0}
canvas{border:2px solid #2b3261;border-radius:10px;background:#faf3e1}
.examples{margin-top:16px;width:100%;max-width:380px}
.ex{background:#f0e8d0;border-radius:8px;padding:10px 14px;margin:6px 0}
.ex .kanji{font-size:22px;color:#2b3261;font-weight:bold}
.ex .rom{font-size:13px;color:#7a6b20;margin-top:2px}
.ex .th{font-size:13px;color:#2b3261;margin-top:2px}
.back{margin-top:20px;color:#2b3261;font-size:13px;opacity:.6}
</style>
</head>
<body>
<h1>語</h1>
<div class="info">音読み <b>ゴ</b> &nbsp;|&nbsp; 訓読み <b>かたる</b></div>
<div class="info"><span>ความหมาย: </span><b>ภาษา</b></div>
<div id="canvas-wrap"><canvas id="c" width="280" height="280"></canvas></div>
<div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center">
  <button class="btn" onclick="playAnim()">▶ ดู Stroke Order</button>
  <button class="btn" onclick="speakJP()">🔊 ฟังเสียง</button>
</div>
<div class="examples">
  <div class="ex">
    <div class="kanji">日本語</div>
    <div class="rom">nihongo</div>
    <div class="th">ภาษาญี่ปุ่น</div>
  </div>
  <div class="ex">
    <div class="kanji">英語</div>
    <div class="rom">eigo</div>
    <div class="th">อังกฤษ</div>
  </div>
</div>
<div class="back">JLPT N5 Kanji Writing Practice</div>
<script>
const strokes=[[[26.0, 15.25, 28.82, 16.66, 33.29, 21.05, 34.0, 23.25]], [[12.37, 32.97, 13.62, 33.25, 15.25, 33.63, 16.73, 33.5], [16.73, 33.5, 23.75, 32.91, 34.51, 31.75, 42.68, 30.5], [42.68, 30.5, 44.2, 30.27, 46.25, 30.12, 47.84, 30.53]], [[18.73, 45.76, 19.11, 45.94, 21.44, 45.96, 21.83, 45.94], [21.83, 45.94, 25.8, 45.73, 31.62, 44.75, 36.29, 43.63], [36.29, 43.63, 37.96, 43.23, 39.0, 43.25, 40.15, 43.55]], [[18.73, 58.89, 19.62, 59.12, 20.62, 59.25, 22.08, 59.04], [22.08, 59.04, 25.97, 58.5, 32.79, 57.53, 36.93, 56.75], [36.93, 56.75, 37.63, 56.62, 38.75, 56.49, 39.54, 56.65]], [[17.14, 71.9, 17.77, 72.52, 18.26, 73.55, 18.37, 74.47], [18.37, 74.47, 19.0, 79.5, 19.88, 84.75, 20.6, 90.06], [20.6, 90.06, 20.74, 91.09, 20.87, 92.08, 21.01, 92.99]], [[19.37, 73.6, 25.04, 72.66, 34.84, 70.87, 39.73, 70.12], [39.73, 70.12, 41.22, 69.9, 42.12, 71.17, 41.91, 72.2], [41.91, 72.2, 41.2, 75.64, 39.64, 81.95, 38.68, 86.09]], [[21.47, 89.02, 25.42, 88.57, 32.18, 87.83, 37.75, 87.41], [37.75, 87.41, 38.96, 87.32, 40.11, 87.24, 41.16, 87.19]], [[51.79, 17.49, 53.17, 17.75, 55.7, 17.77, 57.06, 17.64], [57.06, 17.64, 63.88, 17.0, 72.62, 15.62, 80.0, 15.32], [80.0, 15.32, 82.3, 15.22, 83.67, 15.36, 84.81, 15.47]], [[67.75, 20.25, 68.12, 21.5, 68.25, 22.63, 67.98, 24.0], [67.98, 24.0, 67.23, 27.78, 61.95, 47.83, 60.02, 55.58]], [[52.18, 36.96, 54.0, 37.62, 56.35, 37.91, 58.02, 37.62], [58.02, 37.62, 66.5, 36.12, 74.15, 34.56, 80.76, 33.52], [80.76, 33.52, 83.25, 33.13, 84.81, 34.79, 84.47, 36.45], [84.47, 36.45, 83.87, 39.38, 81.99, 47.88, 80.73, 54.31]], [[46.33, 58.46, 47.46, 58.7, 50.27, 58.66, 51.4, 58.54], [51.4, 58.54, 63.74, 57.25, 70.51, 56.15, 92.28, 54.52], [92.28, 54.52, 94.16, 54.38, 96.03, 54.5, 96.97, 54.61]], [[52.5, 69.88, 53.43, 70.81, 53.92, 72.16, 54.04, 73.19], [54.04, 73.19, 54.75, 79.25, 55.46, 85.84, 56.1, 92.49], [56.1, 92.49, 56.25, 93.99, 56.38, 94.93, 56.5, 96.24]], [[54.99, 71.67, 64.46, 70.22, 78.74, 68.26, 83.84, 67.77], [83.84, 67.77, 85.98, 67.56, 87.12, 68.75, 86.7, 70.7], [86.7, 70.7, 85.86, 74.58, 83.62, 83.27, 82.31, 88.28]], [[57.2, 91.49, 63.14, 90.94, 71.87, 90.25, 80.74, 89.73], [80.74, 89.73, 82.04, 89.65, 83.37, 89.6, 84.71, 89.53]]];
const W=280,SCALE=W*0.82/109,OX=W*0.09,OY=W*0.09;
const cv=document.getElementById('c'),ctx=cv.getContext('2d');

function tx(x){return OX+x*SCALE}
function ty(y){return OY+(109-y)*SCALE}

function drawSegs(segs,alpha,lw){
  ctx.strokeStyle=`rgba(43,50,97,${alpha})`;
  ctx.lineWidth=lw;ctx.lineCap='round';ctx.lineJoin='round';
  ctx.beginPath();
  for(const s of segs){
    ctx.moveTo(tx(s[0]),ty(s[1]));
    ctx.bezierCurveTo(tx(s[2]),ty(s[3]),tx(s[4]),ty(s[5]),tx(s[6]),ty(s[7]));
  }
  ctx.stroke();
}

function drawAll(upTo,highlightLast){
  ctx.clearRect(0,0,W,W);
  for(let i=0;i<upTo-1;i++) drawSegs(strokes[i],0.25,3);
  if(upTo>0) drawSegs(strokes[upTo-1],1.0, highlightLast?5:3);
}

let frame=0,timer=null;
function playAnim(){
  clearInterval(timer);frame=0;
  timer=setInterval(()=>{
    frame++;drawAll(frame,true);
    if(frame>=strokes.length)clearInterval(timer);
  },600);
}

function speakJP(){
  const u=new SpeechSynthesisUtterance('語');
  u.lang='ja-JP';u.rate=0.8;
  speechSynthesis.speak(u);
}

// draw complete on load
drawAll(strokes.length,false);
</script>
</body>
</html>

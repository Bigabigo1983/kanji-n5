<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>読 — Kanji N5</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#faf3e1;font-family:sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:20px}
h1{font-size:120px;color:#2b3261;margin:10px 0;line-height:1}
.info{color:#2b3261;font-size:16px;margin:6px 0;text-align:center}
.info span{font-size:14px;opacity:.7}
.btn{margin:14px 6px;padding:12px 28px;border:none;border-radius:8px;font-size:16px;cursor:pointer;background:#2b3261;color:#faf3e1}
.btn:active{opacity:.8}
#canvas-wrap{margin:10px 0}
canvas{border:2px solid #2b3261;border-radius:10px;background:#faf3e1}
.examples{margin-top:16px;width:100%;max-width:380px}
.ex{background:#f0e8d0;border-radius:8px;padding:10px 14px;margin:6px 0}
.ex .kanji{font-size:22px;color:#2b3261;font-weight:bold}
.ex .rom{font-size:13px;color:#7a6b20;margin-top:2px}
.ex .th{font-size:13px;color:#2b3261;margin-top:2px}
.back{margin-top:20px;color:#2b3261;font-size:13px;opacity:.6}
</style>
</head>
<body>
<h1>読</h1>
<div class="info">音読み <b>ドク</b> &nbsp;|&nbsp; 訓読み <b>よむ</b></div>
<div class="info"><span>ความหมาย: </span><b>อ่าน</b></div>
<div id="canvas-wrap"><canvas id="c" width="280" height="280"></canvas></div>
<div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center">
  <button class="btn" onclick="playAnim()">▶ ดู Stroke Order</button>
  <button class="btn" onclick="speakJP()">🔊 ฟังเสียง</button>
</div>
<div class="examples">
  <div class="ex">
    <div class="kanji">読む</div>
    <div class="rom">yomu</div>
    <div class="th">อ่าน</div>
  </div>
  <div class="ex">
    <div class="kanji">読書</div>
    <div class="rom">dokusho</div>
    <div class="th">การอ่าน</div>
  </div>
</div>
<div class="back">JLPT N5 Kanji Writing Practice</div>
<script>
const strokes=[[[22.38, 14.75, 24.63, 16.38, 28.19, 21.46, 28.75, 24.0]], [[10.37, 33.08, 11.98, 33.56, 13.99, 33.43, 15.64, 33.22], [15.64, 33.22, 21.6, 32.46, 29.16, 31.8, 35.74, 30.84], [35.74, 30.84, 37.24, 30.62, 38.83, 30.41, 40.34, 30.68]], [[16.23, 46.31, 17.4, 46.68, 18.96, 46.49, 20.16, 46.3], [20.16, 46.3, 24.15, 45.68, 28.49, 45.1, 31.74, 44.33], [31.74, 44.33, 33.09, 44.01, 35.0, 43.75, 36.39, 43.75]], [[16.73, 58.58, 17.75, 58.93, 19.19, 58.73, 20.26, 58.62], [20.26, 58.62, 24.06, 58.22, 29.83, 57.45, 32.81, 56.85], [32.81, 56.85, 34.26, 56.56, 35.75, 56.37, 37.03, 56.71]], [[15.64, 70.4, 16.35, 71.01, 16.72, 71.77, 16.76, 72.69], [16.76, 72.69, 17.55, 76.45, 18.47, 82.54, 19.28, 87.74], [19.28, 87.74, 19.44, 88.79, 19.6, 89.8, 19.76, 90.74]], [[17.75, 72.05, 23.84, 71.14, 29.34, 70.35, 35.17, 69.38], [35.17, 69.38, 36.87, 69.1, 37.9, 70.68, 37.66, 71.96], [37.66, 71.96, 36.81, 76.42, 36.05, 78.87, 34.78, 84.74]], [[20.47, 88.3, 24.53, 87.84, 28.23, 87.11, 33.26, 86.38], [33.26, 86.38, 34.18, 86.25, 35.14, 86.12, 36.16, 85.99]], [[46.37, 26.71, 48.68, 27.3, 51.04, 27.13, 53.37, 26.86], [53.37, 26.86, 63.34, 25.72, 75.19, 24.63, 83.14, 23.8], [83.14, 23.8, 85.5, 23.55, 87.52, 23.59, 89.85, 23.94]], [[65.76, 13.25, 66.82, 14.31, 67.35, 15.33, 67.35, 16.5], [67.35, 16.5, 67.35, 25.0, 67.28, 33.53, 67.16, 36.96]], [[52.53, 38.58, 54.75, 39.0, 56.68, 38.88, 58.51, 38.66], [58.51, 38.66, 64.0, 38.0, 71.21, 37.1, 78.0, 36.47], [78.0, 36.47, 79.61, 36.32, 81.63, 36.18, 83.23, 36.51]], [[46.14, 48.1, 46.03, 52.03, 44.44, 60.1, 43.54, 62.45]], [[47.0, 49.96, 58.42, 48.69, 75.0, 46.25, 88.35, 45.68], [88.35, 45.68, 97.5, 45.29, 88.78, 52.82, 87.61, 54.03]], [[59.49, 59.25, 59.99, 60.77, 60.2, 62.34, 59.78, 64.08], [59.78, 64.08, 57.02, 75.69, 53.24, 87.02, 44.52, 94.69]], [[71.64, 56.26, 72.75, 57.5, 73.29, 58.93, 73.33, 60.63], [73.33, 60.63, 73.44, 65.25, 73.2, 77.62, 73.2, 85.25], [73.2, 85.25, 73.2, 94.75, 74.0, 95.77, 84.5, 95.77], [84.5, 95.77, 95.5, 95.77, 95.88, 94.75, 95.88, 88.46]]];
const W=280,SCALE=W*0.82/109,OX=W*0.09,OY=W*0.09;
const cv=document.getElementById('c'),ctx=cv.getContext('2d');

function tx(x){return OX+x*SCALE}
function ty(y){return OY+(109-y)*SCALE}

function drawSegs(segs,alpha,lw){
  ctx.strokeStyle=`rgba(43,50,97,${alpha})`;
  ctx.lineWidth=lw;ctx.lineCap='round';ctx.lineJoin='round';
  ctx.beginPath();
  for(const s of segs){
    ctx.moveTo(tx(s[0]),ty(s[1]));
    ctx.bezierCurveTo(tx(s[2]),ty(s[3]),tx(s[4]),ty(s[5]),tx(s[6]),ty(s[7]));
  }
  ctx.stroke();
}

function drawAll(upTo,highlightLast){
  ctx.clearRect(0,0,W,W);
  for(let i=0;i<upTo-1;i++) drawSegs(strokes[i],0.25,3);
  if(upTo>0) drawSegs(strokes[upTo-1],1.0, highlightLast?5:3);
}

let frame=0,timer=null;
function playAnim(){
  clearInterval(timer);frame=0;
  timer=setInterval(()=>{
    frame++;drawAll(frame,true);
    if(frame>=strokes.length)clearInterval(timer);
  },600);
}

function speakJP(){
  const u=new SpeechSynthesisUtterance('読');
  u.lang='ja-JP';u.rate=0.8;
  speechSynthesis.speak(u);
}

// draw complete on load
drawAll(strokes.length,false);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>週 — Kanji N5</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#faf3e1;font-family:sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:20px}
h1{font-size:120px;color:#2b3261;margin:10px 0;line-height:1}
.info{color:#2b3261;font-size:16px;margin:6px 0;text-align:center}
.info span{font-size:14px;opacity:.7}
.btn{margin:14px 6px;padding:12px 28px;border:none;border-radius:8px;font-size:16px;cursor:pointer;background:#2b3261;color:#faf3e1}
.btn:active{opacity:.8}
#canvas-wrap{margin:10px 0}
canvas{border:2px solid #2b3261;border-radius:10px;background:#faf3e1}
.examples{margin-top:16px;width:100%;max-width:380px}
.ex{background:#f0e8d0;border-radius:8px;padding:10px 14px;margin:6px 0}
.ex .kanji{font-size:22px;color:#2b3261;font-weight:bold}
.ex .rom{font-size:13px;color:#7a6b20;margin-top:2px}
.ex .th{font-size:13px;color:#2b3261;margin-top:2px}
.back{margin-top:20px;color:#2b3261;font-size:13px;opacity:.6}
</style>
</head>
<body>
<h1>週</h1>
<div class="info">音読み <b>シュウ</b> &nbsp;|&nbsp; 訓読み <b>—</b></div>
<div class="info"><span>ความหมาย: </span><b>สัปดาห์</b></div>
<div id="canvas-wrap"><canvas id="c" width="280" height="280"></canvas></div>
<div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center">
  <button class="btn" onclick="playAnim()">▶ ดู Stroke Order</button>
  <button class="btn" onclick="speakJP()">🔊 ฟังเสียง</button>
</div>
<div class="examples">
  <div class="ex">
    <div class="kanji">今週</div>
    <div class="rom">konshuu</div>
    <div class="th">สัปดาห์นี้</div>
  </div>
  <div class="ex">
    <div class="kanji">先週</div>
    <div class="rom">senshuu</div>
    <div class="th">อาทิตย์ที่แล้ว</div>
  </div>
</div>
<div class="back">JLPT N5 Kanji Writing Practice</div>
<script>
const strokes=[[[45.93, 17.66, 46.95, 18.68, 47.6, 20.21, 47.6, 21.96], [47.6, 21.96, 47.6, 43.0, 50.13, 67.5, 39.5, 80.75]], [[48.49, 18.95, 58.28, 17.7, 80.78, 14.56, 81.9, 14.5], [81.9, 14.5, 86.24, 14.26, 87.32, 15.76, 87.32, 20.14], [87.32, 20.14, 87.32, 22.07, 87.49, 72.3, 87.49, 76.74], [87.49, 76.74, 87.49, 86.27, 82.21, 81.6, 79.09, 78.43]], [[55.43, 31.42, 56.26, 31.67, 58.31, 31.96, 59.15, 31.93], [59.15, 31.93, 63.69, 31.75, 72.66, 30.01, 75.99, 29.7], [75.99, 29.7, 77.38, 29.57, 78.21, 29.63, 78.9, 29.73]], [[65.84, 22.3, 66.83, 23.29, 67.35, 24.62, 67.35, 25.69], [67.35, 25.69, 67.35, 28.88, 67.28, 36.13, 67.28, 42.5]], [[53.61, 44.53, 54.61, 44.88, 56.25, 44.94, 57.92, 44.76], [57.92, 44.76, 65.0, 44.0, 70.38, 43.38, 77.01, 42.4], [77.01, 42.4, 78.85, 42.13, 80.26, 42.0, 81.82, 42.14]], [[56.17, 53.75, 57.25, 54.5, 57.77, 55.76, 57.88, 56.72], [57.88, 56.72, 58.38, 61.25, 58.93, 63.35, 59.36, 66.99], [59.36, 66.99, 59.53, 68.45, 59.66, 69.57, 59.7, 69.93]], [[58.6, 55.4, 64.46, 54.01, 72.29, 52.57, 74.89, 52.38], [74.89, 52.38, 76.62, 52.25, 77.37, 53.38, 77.17, 54.96], [77.17, 54.96, 76.79, 57.88, 75.83, 60.9, 75.05, 64.57]], [[60.65, 67.64, 62.97, 67.2, 68.95, 66.54, 73.75, 66.01], [73.75, 66.01, 75.18, 65.85, 76.44, 65.73, 77.36, 65.67]], [[20.71, 19.0, 23.81, 20.41, 28.73, 24.8, 29.5, 27.0]], [[13.25, 54.95, 15.5, 55.87, 17.54, 55.79, 18.5, 55.43], [18.5, 55.43, 21.0, 54.5, 26.81, 51.37, 28.25, 50.75], [28.25, 50.75, 31.13, 49.51, 32.39, 51.65, 29.75, 54.53], [29.75, 54.53, 23.37, 61.51, 23.75, 62.76, 29.0, 68.63], [29.0, 68.63, 30.83, 70.67, 31.03, 72.07, 27.5, 74.75], [27.5, 74.75, 22.25, 78.75, 20.0, 80.5, 16.75, 83.25]], [[13.75, 85.75, 17.87, 84.87, 24.16, 84.78, 28.75, 85.25], [28.75, 85.25, 36.0, 86.0, 58.72, 90.38, 63.25, 91.25], [63.25, 91.25, 76.25, 93.75, 84.5, 95.75, 93.5, 94.0]]];
const W=280,SCALE=W*0.82/109,OX=W*0.09,OY=W*0.09;
const cv=document.getElementById('c'),ctx=cv.getContext('2d');

function tx(x){return OX+x*SCALE}
function ty(y){return OY+(109-y)*SCALE}

function drawSegs(segs,alpha,lw){
  ctx.strokeStyle=`rgba(43,50,97,${alpha})`;
  ctx.lineWidth=lw;ctx.lineCap='round';ctx.lineJoin='round';
  ctx.beginPath();
  for(const s of segs){
    ctx.moveTo(tx(s[0]),ty(s[1]));
    ctx.bezierCurveTo(tx(s[2]),ty(s[3]),tx(s[4]),ty(s[5]),tx(s[6]),ty(s[7]));
  }
  ctx.stroke();
}

function drawAll(upTo,highlightLast){
  ctx.clearRect(0,0,W,W);
  for(let i=0;i<upTo-1;i++) drawSegs(strokes[i],0.25,3);
  if(upTo>0) drawSegs(strokes[upTo-1],1.0, highlightLast?5:3);
}

let frame=0,timer=null;
function playAnim(){
  clearInterval(timer);frame=0;
  timer=setInterval(()=>{
    frame++;drawAll(frame,true);
    if(frame>=strokes.length)clearInterval(timer);
  },600);
}

function speakJP(){
  const u=new SpeechSynthesisUtterance('週');
  u.lang='ja-JP';u.rate=0.8;
  speechSynthesis.speak(u);
}

// draw complete on load
drawAll(strokes.length,false);
</script>
</body>
</html>
